<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1228"/>
      <stop offset="100%" stop-color="#1a0635"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle purple inner glow -->
  <ellipse cx="256" cy="256" rx="220" ry="180" fill="#6d28d9" opacity="0.08"/>

  <!-- Circuit dot accents -->
  <circle cx="80" cy="80" r="6" fill="#7c3aed" opacity="0.5"/>
  <circle cx="432" cy="80" r="6" fill="#06b6d4" opacity="0.5"/>
  <circle cx="80" cy="432" r="6" fill="#06b6d4" opacity="0.5"/>
  <circle cx="432" cy="432" r="6" fill="#7c3aed" opacity="0.5"/>

  <!-- < bracket -->
  <path d="M 150 170 L 76 256 L 150 342"
        stroke="url(#bracket)" stroke-width="40" stroke-linecap="round"
        stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- > bracket -->
  <path d="M 362 170 L 436 256 L 362 342"
        stroke="url(#bracket)" stroke-width="40" stroke-linecap="round"
        stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- / slash -->
  <line x1="300" y1="152" x2="212" y2="360"
        stroke="url(#slash)" stroke-width="40" stroke-linecap="round"
        filter="url(#glow)"/>
</svg>
